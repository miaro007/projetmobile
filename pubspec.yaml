name: projet_flutter
description: "BirdWatch Pro Application - Journal d'Observation Ornithologique"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  uuid: ^4.2.2
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.8
  fl_chart: ^0.66.0
  font_awesome_flutter: ^10.7.0
  http: ^1.2.0
  image_picker: ^1.0.7
  supabase_flutter: ^2.8.1
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.jpg
    - assets/images/header_bird.jpg
    - assets/images/onboarding1.jpg
    - assets/images/onboarding2.jpg
    - assets/images/onboarding3.webp
